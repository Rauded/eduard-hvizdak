    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Open Graph / social card (homepage default; per-page tags set via react-helmet-async) -->

    <meta property="og:site_name" content="Eduard Hvižďák" />
    <meta property="og:title" content="Eduard Hvižďák – AI Engineer & Founder" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Person structured data (stable @id reused as blog-post author) -->

    {
      "@context": "https://schema.org",
      "@type": "Person",
      "@id": "https://eduard-hvizdak.vercel.app/#person",
      "name": "Eduard Hvižďák",
      "url": "https://eduard-hvizdak.vercel.app/",
      "jobTitle": "AI Engineer & Founder",
      "alumniOf": { "@type": "CollegeOrUniversity", "name": "Masaryk University" },
      "knowsAbout": ["Artificial Intelligence", "Retrieval-Augmented Generation", "Multi-agent systems", "Full-stack engineering", "SaaS"],
      "sameAs": [
        "https://github.com/Rauded",
        "https://www.linkedin.com/in/eduard-hvizdak"
      ]
    }
    </script>

      Notice the use of %PUBLIC_URL% in the tags above.
