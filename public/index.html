    <script>
      // Set the theme before first paint so there's no flash of the wrong
      // theme on load. Mirrors ThemeContext: saved choice wins, else OS pref,
      // else light. Keep this in sync with that component.
      (function () {
        try {
          var t = localStorage.getItem('site-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', t === 'dark' ? '#09090b' : '#fafaf8');
        } catch (e) {}
      })();
    </script>
